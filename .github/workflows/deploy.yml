name: Build & Deploy Next.js to Metanet FTP

on:
  push:
    branches:
      - main  # Changed from main to master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm install  # Changed from npm ci for better compatibility with major upgrades

      - name: Build Next.js
        run: npm run build
        env:
          CI: false

      - name: Add .htaccess for Routing (Linux Style)
        run: |
          mkdir -p out
          cat <<EOF > out/.htaccess
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [QSA,L]
          EOF

      - name: Add deploy marker
        run: |
          echo "NEXT.JS SITE LIVE!" > out/deploy-check.txt
          echo "DEPLOYED: $(date)" >> out/deploy-check.txt

      - name: Deploy to FTP ROOT
        uses: sebastianpopp/ftp-action@releases/v2
        with:
          host: ${{ secrets.FTP_SERVER }}
          user: fumescrubber
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: out
          remoteDir: /
          force: true
          options: --delete --verbose

      - name: DONE
        run: echo "NEXT.JS SITE LIVE ON METANET!"